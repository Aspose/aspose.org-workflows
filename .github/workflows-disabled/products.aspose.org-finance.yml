name: products.aspose.org-finance
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    uses: ./.github/workflows/products.family.reusable.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      display_name: Aspose.Finance
      family_slug: finance
      content_dir: content/products.aspose.org/en/finance
      output_mode: family
    secrets: inherit