name: products.aspose.org
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install llms-generator dependencies
        run: pip install pyyaml

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://products.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://products-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build products.aspose.org
        run: hugo --config "./configs/products.aspose.org.toml" -b "${{ env.url }}" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints --enableGitInfo --environment "${{ github.event.inputs.environment }}"

      - name: Generate LLM files
        run: |
          python scripts/generator/llms-generator.py \
            --input content \
            --output llms-output \
            --subdomain products.aspose.org \
            --mapping scripts/generator/mapping.json \
            --clean-output

      - name: Copy LLM files to Hugo output
        run: cp -r llms-output/products.aspose.org/. public/

      - name: Deploy products.aspose.org to S3
        if: github.event.inputs.environment == 'production'
        run: hugo deploy --config "./configs/products.aspose.org.toml" --target "${{ github.event.inputs.environment }}" --invalidateCDN --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Deploy products.aspose.org to Ceph
        if: github.event.inputs.environment == 'production'
        run: hugo deploy --config "./configs/products.aspose.org.toml" --target "production_ceph" --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

      - name: Purge CDN cache
        if: github.event.inputs.environment == 'production'
        shell: bash
        run: |
          curl -siG -H "X-Api-Key: ${{ secrets.BUNNY_NET }}" --data-urlencode "url=${{ env.url }}/*" "https://api.dynabic.com/bn/purge?async=true"
