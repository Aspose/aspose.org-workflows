name: site.family.reusable

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      display_name:
        required: true
        type: string
      family_slug:
        required: false
        type: string
        default: ""
      content_dir:
        required: true
        type: string
      theme:
        required: true
        type: string
      staging_host:
        required: true
        type: string
      production_host:
        required: true
        type: string
      staging_deploy_url:
        required: true
        type: string
      production_deploy_url:
        required: true
        type: string
      staging_distribution_id:
        required: true
        type: string
      production_distribution_id:
        required: true
        type: string
      output_mode:
        required: false
        type: string
        default: family
      copy_root_only:
        required: false
        type: boolean
        default: false
      ceph_production_deploy_url:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.136.0"
          extended: true

      - name: Determine build settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail

          family="${{ inputs.family_slug }}"
          environment="${{ inputs.environment }}"

          if [[ "$environment" == "production" ]]; then
            host="${{ inputs.production_host }}"
            deploy_url="${{ inputs.production_deploy_url }}"
            distribution_id="${{ inputs.production_distribution_id }}"
          else
            host="${{ inputs.staging_host }}"
            deploy_url="${{ inputs.staging_deploy_url }}"
            distribution_id="${{ inputs.staging_distribution_id }}"
          fi

          if [[ -n "$family" ]]; then
            echo "base_url=https://$host/$family" >> "$GITHUB_OUTPUT"
            echo "cache_max_age=22880000" >> "$GITHUB_OUTPUT"
            echo "deploy_extra_args=--maxDeletes=-1" >> "$GITHUB_OUTPUT"
            echo "slug=$family" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://$host" >> "$GITHUB_OUTPUT"
            echo "cache_max_age=2592000" >> "$GITHUB_OUTPUT"
            echo "deploy_extra_args=" >> "$GITHUB_OUTPUT"
            echo "slug=home" >> "$GITHUB_OUTPUT"
          fi

          echo "deploy_url=$deploy_url" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$distribution_id" >> "$GITHUB_OUTPUT"

      - name: Validate content directory
        shell: bash
        run: |
          set -euo pipefail
          test -d "${{ inputs.content_dir }}"

      - name: Stage build content
        id: content
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.copy_root_only }}" == "true" ]]; then
            test -f "${{ inputs.content_dir }}/_index.md"
            staged_dir=".github/generated/content-${{ steps.settings.outputs.slug }}"
            mkdir -p "$staged_dir"
            cp "${{ inputs.content_dir }}/_index.md" "$staged_dir/_index.md"
            echo "build_content_dir=$staged_dir" >> "$GITHUB_OUTPUT"
          else
            echo "build_content_dir=${{ inputs.content_dir }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Hugo config
        id: config
        shell: bash
        run: |
          set -euo pipefail

          config_path=".github/generated/products-${{ steps.settings.outputs.slug }}.toml"
          mkdir -p "$(dirname "$config_path")"

          cat > "$config_path" <<EOF
          theme = "${{ inputs.theme }}"
          defaultContentLanguage = "en"
          defaultContentLanguageInSubdir = false
          disableLanguages = ["de", "es", "fr", "ja", "ko", "ru", "zh", "ar", "it", "pt", "pl", "fa", "id", "cs", "vi", "tr", "th", "sv", "el", "uk"]
          [languages]
            [languages.en]
              contentDir = "${{ steps.content.outputs.build_content_dir }}"
              languageName = "English"
              languageCode = "en"
              weight = 1
          EOF

          if [[ "${{ inputs.output_mode }}" == "home" ]]; then
            cat >> "$config_path" <<'EOF'

          [outputs]
          home = ["HTML", "CustomSitemap"]

          [outputFormats]
            [outputFormats.CustomSitemap]
            name = "CustomSitemap"
            mediaType = "application/xml"
            baseName = "sitemaps"
          EOF
          fi

          cat >> "$config_path" <<EOF

          [deployment]
          [[deployment.targets]]
          name = "staging"
          URL = "${{ inputs.staging_deploy_url }}"
          cloudFrontDistributionID = "${{ inputs.staging_distribution_id }}"

          [[deployment.targets]]
          name = "production"
          URL = "${{ inputs.production_deploy_url }}"
          cloudFrontDistributionID = "${{ inputs.production_distribution_id }}"
          EOF

          if [[ -n "${{ inputs.ceph_production_deploy_url }}" ]]; then
            cat >> "$config_path" <<EOF

          [[deployment.targets]]
          name = "production_ceph"
          URL = "${{ inputs.ceph_production_deploy_url }}"
          EOF
          fi

          if [[ "${{ inputs.output_mode }}" == "home" ]]; then
            cat >> "$config_path" <<'EOF'

          [[deployment.matchers]]
          pattern = '^.+\.(xml)$'
          contentType = "application/xml"
          gzip = true
          force = true
          EOF
          fi

          cat >> "$config_path" <<EOF

          [[deployment.matchers]]
          pattern = '^.+\.(js|css|svg)$'
          cacheControl = "max-age=${{ steps.settings.outputs.cache_max_age }}, no-transform, public"
          gzip = true

          [[deployment.matchers]]
          pattern = '^.+\.(png|jpg|ico)$'
          cacheControl = "max-age=${{ steps.settings.outputs.cache_max_age }}, no-transform, public"
          gzip = false

          [[deployment.matchers]]
          pattern = '^.+\.(html|json)$'
          gzip = true
          EOF

          echo "path=$config_path" >> "$GITHUB_OUTPUT"

      - name: Build ${{ inputs.display_name }}
        run: hugo --config "${{ steps.config.outputs.path }}" -b "${{ steps.settings.outputs.base_url }}" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints --enableGitInfo

      - name: Validate generated output
        shell: bash
        run: |
          set -euo pipefail
          test -f public/index.html
          test -s public/index.html

      - name: Deploy ${{ inputs.display_name }} to S3
        run: hugo deploy --config "${{ steps.config.outputs.path }}" ${{ steps.settings.outputs.deploy_extra_args }} --target "${{ inputs.environment }}" --invalidateCDN --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Deploy ${{ inputs.display_name }} to Ceph
        if: ${{ inputs.environment == 'production' && inputs.ceph_production_deploy_url != '' }}
        run: hugo deploy --config "${{ steps.config.outputs.path }}" ${{ steps.settings.outputs.deploy_extra_args }} --target "production_ceph" --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
