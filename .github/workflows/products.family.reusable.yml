name: products.family.reusable

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      display_name:
        required: true
        type: string
      family_slug:
        required: false
        type: string
        default: ""
      content_dir:
        required: true
        type: string
      output_mode:
        required: false
        type: string
        default: family

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.136.0"
          extended: true

      - name: Determine build settings
        id: settings
        shell: bash
        run: |
          set -euo pipefail

          family="${{ inputs.family_slug }}"
          environment="${{ inputs.environment }}"

          if [[ "$environment" == "production" ]]; then
            host="products.aspose.org"
          else
            host="products-qa.aspose.org"
          fi

          if [[ -n "$family" ]]; then
            echo "base_url=https://$host/$family" >> "$GITHUB_OUTPUT"
            echo "staging_url=s3://products-qa.aspose.org/?prefix=$family/&region=us-west-2" >> "$GITHUB_OUTPUT"
            echo "production_url=s3://products.aspose.org/?prefix=$family/&region=us-west-2" >> "$GITHUB_OUTPUT"
            echo "cache_max_age=22880000" >> "$GITHUB_OUTPUT"
            echo "deploy_extra_args=--maxDeletes=-1" >> "$GITHUB_OUTPUT"
            echo "slug=$family" >> "$GITHUB_OUTPUT"
          else
            echo "base_url=https://$host" >> "$GITHUB_OUTPUT"
            echo "staging_url=s3://products-qa.aspose.org/?region=us-west-2" >> "$GITHUB_OUTPUT"
            echo "production_url=s3://products.aspose.org/?region=us-west-2" >> "$GITHUB_OUTPUT"
            echo "cache_max_age=2592000" >> "$GITHUB_OUTPUT"
            echo "deploy_extra_args=" >> "$GITHUB_OUTPUT"
            echo "slug=home" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate content directory
        shell: bash
        run: |
          set -euo pipefail
          test -d "${{ inputs.content_dir }}"
          test -f "${{ inputs.content_dir }}/_index.md"

      - name: Generate Hugo config
        id: config
        shell: bash
        run: |
          set -euo pipefail

          config_path=".github/generated/products-${{ steps.settings.outputs.slug }}.toml"
          mkdir -p "$(dirname "$config_path")"

          cat > "$config_path" <<EOF
          theme = "products"
          defaultContentLanguage = "en"
          defaultContentLanguageInSubdir = false
          disableLanguages = ["de", "es", "fr", "ja", "ko", "ru", "zh", "ar", "it", "pt", "pl", "fa", "id", "cs", "vi", "tr", "th", "sv", "el", "uk"]
          [languages]
            [languages.en]
              contentDir = "${{ inputs.content_dir }}"
              languageName = "English"
              languageCode = "en"
              weight = 1
          EOF

          if [[ "${{ inputs.output_mode }}" == "home" ]]; then
            cat >> "$config_path" <<'EOF'

          [outputs]
          home = ["HTML", "CustomSitemap"]

          [outputFormats]
            [outputFormats.CustomSitemap]
            name = "CustomSitemap"
            mediaType = "application/xml"
            baseName = "sitemaps"
          EOF
          fi

          cat >> "$config_path" <<EOF

          [deployment]
          [[deployment.targets]]
          name = "staging"
          URL = "${{ steps.settings.outputs.staging_url }}"
          cloudFrontDistributionID = "E8DUFGQ3MLGGR"

          [[deployment.targets]]
          name = "production"
          URL = "${{ steps.settings.outputs.production_url }}"
          cloudFrontDistributionID = "E1WTAPBGIKFKJJ"
          EOF

          if [[ "${{ inputs.output_mode }}" == "home" ]]; then
            cat >> "$config_path" <<'EOF'

          [[deployment.matchers]]
          pattern = "^.+\\.(xml)$"
          contentType = "application/xml"
          gzip = true
          force = true
          EOF
          fi

          cat >> "$config_path" <<EOF

          [[deployment.matchers]]
          pattern = "^.+\\.(js|css|svg)$"
          cacheControl = "max-age=${{ steps.settings.outputs.cache_max_age }}, no-transform, public"
          gzip = true

          [[deployment.matchers]]
          pattern = "^.+\\.(png|jpg|ico)$"
          cacheControl = "max-age=${{ steps.settings.outputs.cache_max_age }}, no-transform, public"
          gzip = false

          [[deployment.matchers]]
          pattern = "^.+\\.(html|json)$"
          gzip = true
          EOF

          echo "path=$config_path" >> "$GITHUB_OUTPUT"

      - name: Build ${{ inputs.display_name }}
        run: hugo --config "${{ steps.config.outputs.path }}" -b "${{ steps.settings.outputs.base_url }}" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints --enableGitInfo

      - name: Validate generated output
        shell: bash
        run: |
          set -euo pipefail
          test -f public/index.html
          grep -Eq "<title>[^<[:space:]]" public/index.html

      - name: Deploy ${{ inputs.display_name }} to S3
        run: hugo deploy --config "${{ steps.config.outputs.path }}" ${{ steps.settings.outputs.deploy_extra_args }} --target "${{ inputs.environment }}" --invalidateCDN --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}
