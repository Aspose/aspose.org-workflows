name: Submit Yandex Sitemap

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'  # Every Sunday at 2:00 AM UTC

jobs:
  sitemap_submission:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout workflows repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Submit sitemaps to Yandex
      env:
        YANDEX_OAUTH_TOKEN: ${{ secrets.YANDEX_OAUTH_TOKEN }}
      run: |
        python scripts/yandex/sitemaps.py
