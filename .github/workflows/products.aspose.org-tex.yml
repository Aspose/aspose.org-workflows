name: products.aspose.org-tex
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    uses: ./.github/workflows/products.family.reusable.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      display_name: Aspose.TeX
      family_slug: tex
      content_dir: content/products.aspose.org/en/tex
      output_mode: family
    secrets: inherit