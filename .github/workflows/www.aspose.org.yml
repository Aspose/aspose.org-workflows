name: www.aspose.org
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://www.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build www.aspose.org
        run: hugo --config "./configs/www.aspose.org.toml" -b "${{ env.url }}" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints --enableGitInfo --environment "${{ github.event.inputs.environment }}"

      # S3 is optional under production policy. Bucket missing or unavailable
      # emits a warning annotation and continues — never blocks Ceph production.
      - name: Deploy www.aspose.org to S3 (optional)
        id: s3_deploy
        continue-on-error: true
        run: hugo deploy --config "./configs/www.aspose.org.toml" --maxDeletes=-1 --target "${{ github.event.inputs.environment }}" --invalidateCDN --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Warn on optional S3 deploy failure
        if: steps.s3_deploy.outcome == 'failure'
        run: |
          echo "::warning title=Optional S3 target unavailable::www.aspose.org ${{ github.event.inputs.environment }} S3 deploy failed (bucket missing or access denied). S3 is optional — Ceph production is the required target. Continuing pipeline."

      # Ceph is the required production target. This step is a hard fail.
      - name: Deploy www.aspose.org to Ceph
        if: github.event.inputs.environment == 'production'
        run: hugo deploy --config "./configs/www.aspose.org.toml" --maxDeletes=-1 --target "production_ceph" --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
