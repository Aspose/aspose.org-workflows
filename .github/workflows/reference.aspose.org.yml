name: reference.aspose.org
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true

# Two concurrent dispatches would interleave uploads into the shared bucket
# (last-writer-wins per key). Queue runs per environment instead.
concurrency:
  group: reference-aspose-org-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  discover:
    name: "discover shards"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Checkout site repo (sparse -- en content tree + configs)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            content/reference.aspose.org/en
          sparse-checkout-cone-mode: false

      - name: Generate shard matrix from content tree (no hardcoded lists)
        id: gen
        shell: bash
        run: |
          set -euo pipefail
          matrix=$(find content/reference.aspose.org/en -mindepth 2 -maxdepth 2 -type d \
            | sed 's#.*/en/##' | sort \
            | jq -R 'split("/") | {family: .[0], platform: .[1]}' \
            | jq -sc '{include: .}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Discovered shards:"
          echo "$matrix" | jq -r '.include[] | "\(.family)/\(.platform)"'

      - name: Size-guard (fail fast if any shard exceeds the runner budget)
        shell: bash
        run: |
          set -euo pipefail
          # rendered pages per shard = en leaf pages x locale count (both derived, not hardcoded)
          BUDGET=33000   # above proven-safe pdf/net (~30k), below the ~40k monolithic slides failure
          locales=$(grep -cE '^\s*\[languages\.[a-z]+\]' configs/reference.aspose.org.toml)
          echo "locales=$locales budget=$BUDGET"
          fail=0
          while IFS=/ read -r fam plat; do
            pages=$(find "content/reference.aspose.org/en/$fam/$plat" -name '*.md' ! -name '_index.md' | wc -l)
            rendered=$(( pages * locales ))
            printf '%-10s %-12s pages=%-5s rendered=%s\n' "$fam" "$plat" "$pages" "$rendered"
            if [ "$rendered" -gt "$BUDGET" ]; then
              echo "::error title=Shard over budget::$fam/$plat projects $rendered rendered pages > $BUDGET. Enable locale-sharding for this shard (see plan zesty-whistling-hopper §5.1)."
              fail=1
            fi
          done < <(find content/reference.aspose.org/en -mindepth 2 -maxdepth 2 -type d | sed 's#.*/en/##' | sort)
          exit $fail

  deploy-content:
    name: "deploy / ${{ matrix.family }}-${{ matrix.platform }}"
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout site repo (sparse -- one shard + nav indexes)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            content/reference.aspose.org/*/*/_index.md
            content/reference.aspose.org/*/*/*/_index.md
            content/reference.aspose.org/*/${{ matrix.family }}/_index*.md
            content/reference.aspose.org/*/${{ matrix.family }}/${{ matrix.platform }}
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Synthesize shard segment config
        shell: bash
        # Hugo's multi --config merge silently DROPS [segments] from overlay files, and an
        # unknown --renderSegments name fails OPEN (renders everything). So we concatenate
        # into one file and verify the segment exists before building.
        run: |
          set -euo pipefail
          fam='${{ matrix.family }}'; plat='${{ matrix.platform }}'
          cp configs/reference.aspose.org.toml "$RUNNER_TEMP/job.toml"
          {
            printf '\n[[segments.target.includes]]\n'
            printf '  path = "{/%s,/%s/%s,/%s/%s/**}"\n' "$fam" "$fam" "$plat" "$fam" "$plat"
          } >> "$RUNNER_TEMP/job.toml"
          hugo config --config "$RUNNER_TEMP/job.toml" --format json \
            | jq -e '.segments.target.includes[0].path' >/dev/null \
            || { echo "::error::segments.target missing after synthesis"; exit 1; }

      - name: Build ${{ matrix.family }}/${{ matrix.platform }} (all locales, bounded retry)
        env:
          HUGO_ENABLEGITINFO: "false"
        shell: bash
        run: |
          set -uo pipefail
          for attempt in 1 2; do
            if hugo --config "$RUNNER_TEMP/job.toml" \
                 --renderSegments "target" \
                 -b "${{ env.url }}" \
                 --cleanDestinationDir --minify \
                 --environment "${{ github.event.inputs.environment }}"; then
              exit 0
            fi
            echo "::warning title=Build retry::attempt $attempt failed for ${{ matrix.family }}/${{ matrix.platform }}"
            rm -rf public
          done
          exit 1

      - name: Isolation guard (Hugo fails open on segment mistakes -- never deploy a leak)
        shell: bash
        run: |
          set -euo pipefail
          fam='${{ matrix.family }}'
          # Every rendered index.html must belong to this shard's family (locale-prefixed or root).
          leaked=$(find public -name 'index.html' -printf '%P\n' \
            | awk -F/ '{ seg = ($1 ~ /^[a-z]{2}(-[a-z]+)?$/ && NF > 1) ? $2 : $1; print seg }' \
            | sort -u | grep -vx "$fam" || true)
          if [ -n "$leaked" ]; then
            echo "::error title=Segment leak::rendered HTML outside $fam: $leaked"
            exit 1
          fi
          # A shard that rendered nothing must never silently "succeed" (bad synthesized
          # config renders 0 pages and would deploy an empty set as green).
          rendered=$(find public -name 'index.html' | wc -l)
          if [ "$rendered" -lt 10 ]; then
            echo "::error title=Empty shard::only $rendered pages rendered for $fam -- synthesized config or checkout is broken"
            exit 1
          fi
          # Whole-site aggregates must never come from a shard job.
          if find public \( -name 'sitemap*.xml' \) | grep -q .; then
            echo "::error title=Aggregate leak::shard job emitted sitemap files"
            exit 1
          fi
          echo "isolation OK: only $fam rendered, no aggregates"

      - name: Deploy ${{ matrix.family }}/${{ matrix.platform }} to Ceph
        if: github.event.inputs.environment == 'production'
        # --maxDeletes 0 = upload-only; a shard must never delete other shards' files
        run: |
          hugo deploy --config "$RUNNER_TEMP/job.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  deploy-shared:
    name: "deploy / shared (home + 404 + llms)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            scripts/generator
            scripts/pipeline/core
            content/reference.aspose.org/*/_index.md
            content/reference.aspose.org/*/*/_index.md
            content/reference.aspose.org/*/*/*/_index.md
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install llms-generator dependencies
        run: pip install pyyaml

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build shared segment (home pages + 404, all languages)
        env:
          HUGO_ENABLEGITINFO: "false"
        run: |
          hugo --config "./configs/reference.aspose.org.toml" \
               --renderSegments "shared" \
               -b "${{ env.url }}" \
               --cleanDestinationDir --minify \
               --environment "${{ github.event.inputs.environment }}"

      - name: Generate LLM files
        run: |
          python3 scripts/generator/llms-generator.py \
            --input content \
            --output llms-output \
            --subdomain reference.aspose.org \
            --mapping scripts/generator/mapping.json \
            --clean-output

      - name: Copy LLM files into Hugo output
        run: cp -r llms-output/reference.aspose.org/. public/

      - name: Deploy shared + LLM files to Ceph
        if: github.event.inputs.environment == 'production'
        run: |
          hugo deploy --config "./configs/reference.aspose.org.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  deploy-sitemap:
    name: "deploy / sitemap (full content, all locales)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Decoupled from content-shard success (RC2/RC5 fix): builds from SOURCE, needs only
    # ordering. if always() means a flaky shard can no longer skip the sitemap. Tradeoff
    # (accepted in plan): may briefly list a URL whose shard is mid-retry.
    needs: [discover, deploy-content, deploy-shared]
    if: ${{ always() && needs.discover.result == 'success' }}
    steps:
      - name: Checkout site repo (sparse -- ALL reference content)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            content/reference.aspose.org
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build sitemaps (sitemapindex + one urlset per language, no HTML)
        env:
          HUGO_ENABLEGITINFO: "false"
          # Full-graph build: the FlexSearch template overflows on the whole-site page
          # collection (slice bounds error, reproduced locally 2026-07-14). No HTML renders
          # in this segment anyway, so search assets must stay off here.
          HUGO_PARAMS_SEARCH_ENABLE: "false"
          # Determinism: parallel render raced translation-group pages in/out of locale
          # sitemaps (reproduced 2026-07-14: two identical builds differed). Data-side
          # cause fixed (draft desync, commit b860c6fb92); single-threaded assembly is
          # kept as defense-in-depth so reruns stay byte-identical (~+3 min, this job only).
          HUGO_NUMWORKERMULTIPLIER: "1"
        run: |
          hugo --config "./configs/reference.aspose.org.toml" \
               --renderSegments "sitemap" \
               -b "${{ env.url }}" \
               --cleanDestinationDir --minify \
               --environment "${{ github.event.inputs.environment }}"

      - name: Verify sitemap output (gate before deploy)
        shell: bash
        run: |
          set -euo pipefail
          locales=$(grep -cE '^\s*\[languages\.[a-z]+\]' configs/reference.aspose.org.toml)
          test -f public/sitemap.xml || { echo "::error::root sitemap.xml missing"; exit 1; }
          grep -q "<sitemapindex" public/sitemap.xml || { echo "::error::root sitemap is not a sitemapindex"; exit 1; }
          n=$(grep -o "<loc>" public/sitemap.xml | wc -l)
          [ "$n" -eq "$locales" ] || { echo "::error::sitemapindex has $n entries, expected $locales"; exit 1; }
          test -f public/en/sitemap.xml || { echo "::error::en/sitemap.xml missing"; exit 1; }
          echo "sitemapindex entries=$n locales=$locales"
          if find public -name 'index.html' | grep -q .; then
            echo "::error::sitemap job rendered HTML (segment leak)"; exit 1
          fi

      - name: Deploy sitemaps to Ceph
        if: github.event.inputs.environment == 'production'
        run: |
          hugo deploy --config "./configs/reference.aspose.org.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  purge-cdn:
    name: Purge CDN cache
    needs: [deploy-content, deploy-shared, deploy-sitemap]
    runs-on: ubuntu-latest
    if: ${{ always() && github.event.inputs.environment == 'production' && needs.deploy-sitemap.result == 'success' }}
    steps:
      - name: Purge CDN cache
        id: cdn_purge
        continue-on-error: true
        shell: bash
        run: |
          curl -iG \
            -H "X-Api-Key: ${{ secrets.BUNNY_NET }}" \
            --data-urlencode "url=https://reference.aspose.org/*" \
            "https://api.dynabic.com/bn/purge?async=true"

      - name: Warn on CDN purge failure
        if: steps.cdn_purge.outcome == 'failure'
        run: echo "::warning title=CDN purge failed::reference.aspose.org CDN cache purge failed"
