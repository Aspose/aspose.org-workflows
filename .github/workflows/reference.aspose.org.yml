name: reference.aspose.org
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true

jobs:
  deploy-family:
    name: "deploy / ${{ matrix.segment }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pdf and 3d removed� built by deploy-pdf (split by platform to avoid disk exhaustion)
        # 3d removed -- built by deploy-3d (split by platform to avoid disk exhaustion)
        segment: [barcode, cells, email, font, note, page, slides, tex, words]
    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            content/reference.aspose.org/*/*/_index.md
            content/reference.aspose.org/*/*/*/_index.md
            content/reference.aspose.org/*/${{ matrix.segment }}
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build ${{ matrix.segment }} (all 37 languages)
        env:
          HUGO_ENABLEGITINFO: "false"
        run: |
          hugo --config "./configs/reference.aspose.org.toml" \
               --renderSegments "${{ matrix.segment }}" \
               -b "${{ env.url }}" \
               --cleanDestinationDir --minify \
               --templateMetrics --templateMetricsHints \
               --environment "${{ github.event.inputs.environment }}"

      - name: Deploy ${{ matrix.segment }} to Ceph
        if: github.event.inputs.environment == 'production'
        # --maxDeletes 0 = upload-only; other families' bucket files are never deleted
        run: |
          hugo deploy --config "./configs/reference.aspose.org.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  deploy-pdf:
    name: "deploy / pdf-${{ matrix.platform }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Split pdf by platform: net (808 EN pages), java (552), go (145).
        # Each builds all 37 locales together (Hugo multilingual requirement).
        # Per-job output: ~3 GB, ~2 GB, ~0.5 GB � all fit on ubuntu-latest runners.
        platform: [net, java, go]
    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            content/reference.aspose.org/*/*/_index.md
            content/reference.aspose.org/*/*/*/_index.md
            content/reference.aspose.org/*/pdf/_index*.md
            content/reference.aspose.org/*/pdf/${{ matrix.platform }}
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build pdf-${{ matrix.platform }} (all 37 languages)
        env:
          HUGO_ENABLEGITINFO: "false"
          # Disable FlexSearch index generation � search-data.json aggregates ALL .Site.Pages
          # regardless of --renderSegments; with 37 locales � all families the Turkish locale
          # exceeds Hugo's 3072-page slice capacity. Search is built by deploy-family jobs instead.
          HUGO_PARAMS_SEARCH_ENABLE: "false"
        run: |
          hugo --config "./configs/reference.aspose.org.toml" \
               --renderSegments "pdf-${{ matrix.platform }}" \
               -b "${{ env.url }}" \
               --cleanDestinationDir --minify \
               --templateMetrics --templateMetricsHints \
               --environment "${{ github.event.inputs.environment }}"

      - name: Deploy pdf-${{ matrix.platform }} to Ceph
        if: github.event.inputs.environment == 'production'
        # --maxDeletes 0 = upload-only; other families' bucket files are never deleted
        run: |
          hugo deploy --config "./configs/reference.aspose.org.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  deploy-3d:
    name: "deploy / 3d-${{ matrix.platform }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Split 3d by platform: python (120 EN), typescript (143), net (201), java (215).
        # Each builds all 37 locales together (Hugo multilingual requirement).
        # Avoids disk exhaustion on GHA runners (25,123 total pages with 37 locales).
        platform: [python, typescript, net, java]
    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            content/reference.aspose.org/*/*/_index.md
            content/reference.aspose.org/*/*/*/_index.md
            content/reference.aspose.org/*/3d/_index*.md
            content/reference.aspose.org/*/3d/${{ matrix.platform }}
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build 3d-${{ matrix.platform }} (all 37 languages)
        env:
          HUGO_ENABLEGITINFO: "false"
          HUGO_PARAMS_SEARCH_ENABLE: "false"
        run: |
          hugo --config "./configs/reference.aspose.org.toml" \
               --renderSegments "3d-${{ matrix.platform }}" \
               -b "${{ env.url }}" \
               --cleanDestinationDir --minify \
               --templateMetrics --templateMetricsHints \
               --environment "${{ github.event.inputs.environment }}"

      - name: Deploy 3d-${{ matrix.platform }} to Ceph
        if: github.event.inputs.environment == 'production'
        run: |
          hugo deploy --config "./configs/reference.aspose.org.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  deploy-shared:
    name: "deploy / shared (home + 404 + llms)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo (sparse)
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 1
          filter: blob:none
          sparse-checkout: |
            configs
            layouts
            themes
            assets
            static
            data
            i18n
            scripts/generator
            scripts/pipeline/core
            content/reference.aspose.org/*/_index.md
            content/reference.aspose.org/*/*/_index.md
            content/reference.aspose.org/*/*/*/_index.md
          sparse-checkout-cone-mode: false

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install llms-generator dependencies
        run: pip install pyyaml

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://reference.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://reference-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build shared segment (home pages + 404, all languages)
        env:
          HUGO_ENABLEGITINFO: "false"
        run: |
          hugo --config "./configs/reference.aspose.org.toml" \
               --renderSegments "shared" \
               -b "${{ env.url }}" \
               --cleanDestinationDir --minify \
               --environment "${{ github.event.inputs.environment }}"

      - name: Generate LLM files
        run: |
          python3 scripts/generator/llms-generator.py \
            --input content \
            --output llms-output \
            --subdomain reference.aspose.org \
            --mapping scripts/generator/mapping.json \
            --clean-output

      - name: Copy LLM files into Hugo output
        run: cp -r llms-output/reference.aspose.org/. public/

      - name: Deploy shared + LLM files to Ceph
        if: github.event.inputs.environment == 'production'
        # --maxDeletes 0 = upload-only; other families' bucket files are never deleted
        run: |
          hugo deploy --config "./configs/reference.aspose.org.toml" \
                      --target "production_ceph" \
                      --force \
                      --maxDeletes 0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

  purge-cdn:
    name: Purge CDN cache
    needs: [deploy-family, deploy-pdf, deploy-3d, deploy-shared]
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production'
    steps:
      - name: Purge CDN cache
        id: cdn_purge
        continue-on-error: true
        shell: bash
        run: |
          curl -iG \
            -H "X-Api-Key: ${{ secrets.BUNNY_NET }}" \
            --data-urlencode "url=https://reference.aspose.org/*" \
            "https://api.dynabic.com/bn/purge?async=true"

      - name: Warn on CDN purge failure
        if: steps.cdn_purge.outcome == 'failure'
        run: echo "::warning title=CDN purge failed::reference.aspose.org CDN cache purge failed"
