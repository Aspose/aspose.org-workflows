name: products.aspose.org-cad
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    uses: ./.github/workflows/products.family.reusable.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      display_name: Aspose.CAD
      family_slug: cad
      content_dir: content/products.aspose.org/en/cad
      output_mode: family
    secrets: inherit