name: docs.aspose.org
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.136.0"
          extended: true

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://docs.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://docs-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build docs.aspose.org
        run: hugo --config "./configs/docs.aspose.org.toml" -b "${{ env.url }}" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints --enableGitInfo

      - name: Deploy docs.aspose.org to S3
        run: hugo deploy --config "./configs/docs.aspose.org.toml" --target "${{ github.event.inputs.environment }}" --invalidateCDN --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SECRET_ACCESS }}

      - name: Deploy docs.aspose.org to Ceph
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            TARGET="production_ceph"
          else
            TARGET="staging_ceph"
          fi
          hugo deploy --config "./configs/docs.aspose.org.toml" --target "$TARGET" --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}

      - name: Purge CDN cache
        shell: bash
        run: |
          curl -siG -H "X-Api-Key: ${{ secrets.BUNNY_NET }}" --data-urlencode "url=${{ env.url }}/*" "https://api.dynabic.com/bn/purge?async=true"
