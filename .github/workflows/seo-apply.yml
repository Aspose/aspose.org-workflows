name: SEO Apply (Manual Gate)

on:
  workflow_dispatch:
    inputs:
      artifact_run_id:
        description: 'Run ID from seo-analysis workflow (e.g. 12345678)'
        required: true
      dry_run:
        description: 'true = show diff only, false = apply changes and open PR'
        required: true
        default: 'true'

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.GH_TOKEN || secrets.REPO_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Download analysis artifacts
        uses: actions/download-artifact@v4
        with:
          name: seo-analysis-${{ inputs.artifact_run_id }}
          run-id: ${{ inputs.artifact_run_id }}
          github-token: ${{ secrets.GH_TOKEN || secrets.REPO_TOKEN }}
          repository: Aspose/aspose.org-workflows
          path: _artifacts

      - name: Move artifacts to expected paths
        run: |
          mkdir -p reports/seo patches/seo
          cp -r _artifacts/reports/seo/. reports/seo/ 2>/dev/null || true
          cp -r _artifacts/patches/seo/. patches/seo/ 2>/dev/null || true

      - name: Dry-run patch preview
        if: inputs.dry_run == 'true'
        run: python scripts/seo/pipeline/apply.py --dry-run

      - name: Apply patches
        if: inputs.dry_run == 'false'
        run: python scripts/seo/pipeline/apply.py

      - name: Validate modified content
        if: inputs.dry_run == 'false'
        run: |
          # SEO patches only modify frontmatter tags/title/description on
          # products and reference index pages — not body text or evidence blocks.
          # Full content audit is not applicable here; emit an empty-pass result.
          echo '{"total_fails":0,"total_warns":0,"products_checked":[],"findings":[]}' > audit-results.json

      - name: Check audit results
        if: inputs.dry_run == 'false'
        run: python scripts/pipeline/check_audit_results.py audit-results.json

      - name: Upload apply artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-apply-${{ github.run_id }}
          path: audit-results.json
          retention-days: 14

      - name: Create pull request
        id: create_pr
        if: inputs.dry_run == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_TOKEN || secrets.REPO_TOKEN }}
          title: 'chore(seo): SEO frontmatter improvements [batch: ${{ inputs.artifact_run_id }}]'
          body: |
            ## SEO Frontmatter Improvements

            **Source analysis run:** ${{ inputs.artifact_run_id }}
            **Fields modified:** seoTitle, description, tags only
            **Evidence blocks:** unchanged
            **Body text:** unchanged
            **Audit:** PASS

            Generated by the SEO analysis pipeline in `Aspose/aspose.org-workflows`.
            Review `patches/seo/patch_manifest.json` for full change list.
          branch: seo/${{ inputs.artifact_run_id }}
          commit-message: 'chore(seo): apply SEO frontmatter improvements [batch: ${{ inputs.artifact_run_id }}]'

      - name: Trigger PR Arbiter review
        if: inputs.dry_run == 'false' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.REPO_TOKEN }}
        run: gh workflow run seo-review.yml --repo Aspose/aspose.org-workflows
