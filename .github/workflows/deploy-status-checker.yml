name: Deploy Status Checker

on:
  workflow_run:
    workflows:
      - "docs.aspose.org"
      - "kb.aspose.org"
      - "products.aspose.org"
      - "reference.aspose.org"
      - "websites.aspose.org"
      - "www.aspose.org"
      - "blog.aspose.org"
    types:
      - completed
  schedule:
    - cron: '0 * * * *'  # Hourly safety net — catches missed events and timeout scenarios
  workflow_dispatch: {}  # Manual trigger for debugging

concurrency:
  group: deploy-manifest-writer
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      GH_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout workflows repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run status checker
        id: check
        run: |
          python3 scripts/deploy/check_status.py \
            --manifest scripts/deploy/deploy_manifest.json \
            --config scripts/deploy/deploy_config.json

      - name: Commit manifest updates
        if: steps.check.outputs.manifest_changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add scripts/deploy/deploy_manifest.json scripts/deploy/scan_state.json
          STATE=$(python3 -c "import json; print(json.load(open('scripts/deploy/deploy_manifest.json'))['state'])")
          git diff --cached --quiet || git commit -m "Deploy status: $STATE $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push

      - name: Create failure issue
        if: steps.check.outputs.deploy_failed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ERROR=$(python3 -c "import json; m=json.load(open('scripts/deploy/deploy_manifest.json')); print(m.get('error','Unknown'))")
          SCAN_ID=$(python3 -c "import json; m=json.load(open('scripts/deploy/deploy_manifest.json')); print(m.get('scan_id','unknown'))")
          BODY=$(printf '**Error:** %s\n\n**Scan ID:** `%s`\n**Run:** ${{ github.run_id }}\n\nReview the manifest and re-trigger manually after resolving the root cause.' "$ERROR" "$SCAN_ID")
          gh issue create \
            --title "Deploy failed: $SCAN_ID" \
            --body "$BODY" \
            --label "deploy-failure"
