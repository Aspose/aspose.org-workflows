name: websites.aspose.org
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site repo
        uses: actions/checkout@v4
        with:
          repository: Aspose/aspose.org
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Setup Hugo
        run: |
          wget -q https://github.com/gohugoio/hugo/releases/download/v0.154.5/hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          tar xf hugo_extended_withdeploy_0.154.5_linux-amd64.tar.gz
          sudo mv hugo /usr/local/bin/hugo
          hugo version

      - name: Determine Base URL
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "url=https://websites.aspose.org" >> "$GITHUB_ENV"
          else
            echo "url=https://websites-qa.aspose.org" >> "$GITHUB_ENV"
          fi

      - name: Build websites.aspose.org
        run: hugo --config "./configs/websites.aspose.org.toml" -b "${{ env.url }}" --cleanDestinationDir --minify --templateMetrics --templateMetricsHints --enableGitInfo --environment "${{ github.event.inputs.environment }}"

      # Ceph is the required production target. This step is a hard fail.
      - name: Deploy websites.aspose.org to Ceph
        if: github.event.inputs.environment == 'production'
        run: hugo deploy --config "./configs/websites.aspose.org.toml" --maxDeletes=-1 --target "production_ceph" --force
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CEPH_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CEPH_SECRET_ACCESS_KEY }}
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required

      - name: Purge CDN cache
        id: cdn_purge
        if: github.event.inputs.environment == 'production'
        continue-on-error: true
        shell: bash
        run: |
          curl -iG -H "X-Api-Key: ${{ secrets.BUNNY_NET }}" --data-urlencode "url=${{ env.url }}/*" "https://api.dynabic.com/bn/purge?async=true"

      - name: Warn on CDN purge failure
        if: steps.cdn_purge.outcome == 'failure'
        run: echo "::warning title=CDN purge failed::websites.aspose.org CDN cache purge failed — stale content may be served until TTL expires."
