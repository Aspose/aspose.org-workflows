name: products.aspose.org-home
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    uses: ./.github/workflows/products.family.reusable.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      display_name: Aspose.home
      family_slug: ""
      content_dir: content/products.aspose.org/en
      output_mode: home
    secrets: inherit