name: products.aspose.org-home
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    uses: ./.github/workflows/products.family.reusable.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      display_name: Aspose.home
      family_slug: ""
      content_dir: content/products.aspose.org/en
      theme: products
      staging_host: products-qa.aspose.org
      production_host: products.aspose.org
      staging_deploy_url: s3://products-qa.aspose.org/?region=us-west-2
      production_deploy_url: s3://products.aspose.org/?region=us-west-2
      staging_distribution_id: E8DUFGQ3MLGGR
      production_distribution_id: E1WTAPBGIKFKJJ
      output_mode: home
      copy_root_only: true
      ceph_production_deploy_url: s3://products-aspose-org/?endpoint=https://s3.dynabic.com&region=us-east-1
    secrets: inherit
