name: reference.aspose.org-3d
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: environment
        default: staging
        required: true
jobs:
  deploy:
    uses: ./.github/workflows/products.family.reusable.yml
    with:
      environment: ${{ github.event.inputs.environment }}
      display_name: reference.aspose.org 3D
      family_slug: 3d
      content_dir: content/reference.aspose.org/3d/en
      theme: docs
      staging_host: reference-qa.aspose.org
      production_host: reference.aspose.org
      staging_deploy_url: s3://reference-qa.aspose.org/?prefix=3d/&region=us-west-2
      production_deploy_url: s3://reference.aspose.org/?prefix=3d/&region=us-west-2
      staging_distribution_id: E2NZKCX96NYJB7
      production_distribution_id: E1ELI9S231ZZ2Z
      output_mode: family
      ceph_production_deploy_url: s3://reference-aspose-org/?prefix=3d/&endpoint=https://s3.dynabic.com&region=us-east-1
    secrets: inherit
